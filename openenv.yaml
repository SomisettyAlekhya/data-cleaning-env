name: data-cleaning-env
version: 1.0
description: RL environment for automated data cleaning
entrypoint: env.data_env:DataCleaningEnv
observation_model: Observation
action_model: Action
reward_model: Reward
tasks:
  - id: easy
    description: Small dataset with minimal noise
  - id: medium
    description: Dataset with moderate missing values and duplicates
  - id: hard
    description: Highly noisy dataset with many inconsistencies
actions:
  - remove_duplicates
  - fill_missing_mean
  - fill_missing_median
  - fill_missing_mode
  - convert_to_numeric
  - normalize_column
  - normalize_text  
