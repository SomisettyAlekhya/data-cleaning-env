name: data-cleaning-env
description: AI environment for cleaning messy real-world datasets
version: 1.0

entrypoint: api:app

tasks:
  - name: easy
    description: Handle missing values
  - name: medium
    description: Handle missing values and duplicates
  - name: hard
    description: Full dataset cleaning

observation_space:
  rows: int
  columns: list
  missing_values: int
  duplicates: int

action_space:
  action_type: str
  column: str

reward:
  range: [0.0, 1.0]
